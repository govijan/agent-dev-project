name: verify
on:
  pull_request:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "lts/*", cache: "npm" }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:coverage
  perf-informational:
    runs-on: ubuntu-latest
    continue-on-error: true # informational until baseline exists (see testing.md)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "lts/*", cache: "npm" }
      - run: npm ci
      - run: npm run test:perf --if-present
